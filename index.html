<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nusa Media</title>
    <style>
        /* Gaya tampilan dasar agar web terlihat rapi dan modern */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f7f6;
            color: #333;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        .container {
            text-align: center;
            background: white;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
        }
        h1 {
            color: #0070f3;
            margin-bottom: 10px;
        }
        p {
            font-size: 1.1rem;
            color: #666;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Selamat Datang di Nusa Media</h1>
        <p>Situs web statis murni, cepat, dan berjalan tanpa Node.js.</p>
    </div>

</body>
</html>
